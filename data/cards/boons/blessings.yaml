type: blessing
cards:
- name: Blessing of Abadar
  category: boon
  type: blessing
  source: ROTR-2, SS-B, SS-C, WOTR-B, WOTR-C, MM-B, MM-C, BARB-3, BARD-1, CLERIC-3,
    FIGHTER-1, GUNS-3, HUNTER-3, INQUIS-2, MONK-1, MONK-3, MONK-5, OA1-2, ORACLE-1,
    PFTALES-1, RANGER-3, ROGUE-1, SORCERER-2, SUMMONER-2, SUMMONER-5, UI-B, UE-2,
    WARPRIEST-2, WIZARD-B
  traits:
  - Divine
  - Abadar
  checks:
  - difficulty: '6'
    skills:
    - Dexterity
    - Disable
  - difficulty: '5'
    skills:
    - Divine
  powers: |-
    Discard this card to add 1 die to any check.

    Discard this card to add 2 dice to any check to defeat a barrier.

    Discard this card to explore your location.

    After you play this card, if it matches the top card of the blessings discard pile, recharge this card instead of discarding it.
- name: Blessing of Anubis
  category: boon
  type: blessing
  source: MM-4, UI-4
  traits:
  - Divine
  - Anubis
  - Mummy
  - Poison
  checks:
  - difficulty: '8'
    skills:
    - Divine
  - difficulty: '11'
    skills:
    - Charisma
    - Diplomacy
  powers: |-
    Discard this card to add 1 die and the Poison trait to any check.

    Discard this card to add 2 dice to any Charisma check.

    Discard this card to add 2 dice to any check against a bane that has the Mummy or Undead trait; ignore the bane's immunities.

    Discard this card to explore your location.

    After you play this card, if it matches the top card of the blessings discard pile, recharge this card instead of discarding it.
- name: Blessing of Bastet
  category: boon
  type: blessing
  source: MM-B, MM-C, UI-1
  traits:
  - Divine
  - Bastet
  - Gambling
  checks:
  - difficulty: '8'
    skills:
    - Stealth
    - Disable
    - Craft
  - difficulty: '6'
    skills:
    - Divine
  powers: |-
    Recharge this card to allow a character at your location to reroll 1 die on his check, or bury it to reroll all the dice; that character takes the new result.

    Discard this card to examine the top card of your location deck. If it is a bane, encounter it and it may not be evaded; otherwise, you may encounter it.

    After you play this card, if it matches the top card of the blessings discard pile, you may search your deck for a non-blessing card that has the Gambling trait and draw it.
- name: Blessing of Horus
  category: boon
  type: blessing
  source: MM-B, MM-C, UE-1, UW-3
  traits:
  - Divine
  - Horus
  - Electricity
  checks:
  - difficulty: '7'
    skills:
    - Dexterity
    - Ranged
  - difficulty: '6'
    skills:
    - Divine
  powers: |-
    Discard this card to add 1 die and the Electricity trait to any check.

    Discard this card to add 2 dice to any Dexterity non-combat check or to any check that invokes the Electricity trait.

    Discard this card to move, then you may explore your location. You may not use this power during an encounter.

    After you play this card, if it matches the top card of the blessings discard pile, you may move; if you are in an encounter, do so after the encounter.
- name: Blessing of Isis
  category: boon
  type: blessing
  source: MM-3, ALCH-3, UM-3, ORACLE-2
  traits:
  - Divine
  - Isis
  - Acid
  checks:
  - difficulty: '7'
    skills:
    - Divine
  - difficulty: '11'
    skills:
    - Intelligence
    - Craft
  powers: |-
    Discard this card to add 1 die and the Acid trait to any check.

    Discard this card to add 2 dice to any Intelligence check or any check that invokes the Acid or Construct trait.

    Discard this card to explore your location.

    After you play this card, if it matches the top card of the blessings discard pile, recharge a random card that has the Magic trait from your discard pile.
- name: Blessing of Maat
  category: boon
  type: blessing
  source: MM-2, MAGUS-3, UI-2
  traits:
  - Divine
  - Maat
  - Healing
  checks:
  - difficulty: '6'
    skills:
    - Divine
  - difficulty: '10'
    skills:
    - Constitution
    - Fortitude
  powers: |-
    After a character rolls the dice on any check, discard this card to add or subtract up to 3 from the result.

    Recharge this card to reduce damage dealt to you by 2.

    On any non-combat check, when a character assembles the dice, discard this card to replace each die with a d8.

    After you play this card, if it matches the top card of the blessings discard pile, you may discard any number of cards to allow a character at your location to recharge that same number of cards from his discard pile.
- name: Blessing of Nethys
  category: boon
  type: blessing
  source: ROTR-6, WOTR-2, MM-B, MM-C, ALCH-1, CLERIC-6, DRUID-6, FIGHTER-6, GUNS-5,
    MAGUS-2, MONK-6, OA1-4, ORACLE-5, PFTALES-6, RANGER-6, SORCERER-6, SUMMONER-4,
    UM-2, WIZARD-6
  traits:
  - Divine
  - Nethys
  checks:
  - difficulty: '8'
    skills:
    - Wisdom
    - Perception
  - difficulty: '5'
    skills:
    - Divine
  powers: |-
    On any check, discard to bless.

    Discard to examine the top 2 cards of your location, put them back in any order, and explore.

    After you play this card, if the hour matches this card, recharge instead of discarding it.
- name: Blessing of Osiris
  category: boon
  type: blessing
  source: MM-4, ALCH-4, UM-4, WITCH-6, ORACLE-4
  traits:
  - Divine
  - Osiris
  - Healing
  checks:
  - difficulty: '8'
    skills:
    - Divine
  powers: "Discard this card to add 1d4 to any check that invokes the Healing trait.\n\
    \nWhen a character shuffles cards from his discard pile into his deck, discard\
    \ this card to allow him to shuffle an additional 1d4 cards.\n\nDiscard this card\
    \ to explore your location. \n\nAfter you play this card, if it matches the top\
    \ card of the blessings discard pile, each character at your location may recharge\
    \ a random card from her discard pile."
- name: Blessing of Pharasma
  category: boon
  type: blessing
  source: ROTR-B, ROTR-C, SS-B, SS-C, MM-B, MM-C, ALCH-1, ALCH-2, CLERIC-B, DRUID-B,
    DRUID-1, DRUID-4, FIGHTER-1, FIGHTER-2, INQUIS-B, INQUIS-1, INQUIS-4, MAGUS-1,
    MAGUS-4, OA1-1, ORACLE-B, ORACLE-2, ORACLE-6, PFTALES-B, RANGER-4, SORCERER-B,
    SORCERER-1, SORCERER-2, SUMMONER-B, SUMMONER-5, UM-B, WARPRIEST-1, WITCH-B, WITCH-3,
    WITCH-5, WIZARD-B, WIZARD-2, WIZARD-3
  traits:
  - Divine
  - Pharasma
  checks:
  - difficulty: '5'
    skills:
    - Intelligence
    - Arcane
    - Divine
  powers: |-
    On any check, discard to bless.

    On any check, when a character plays a spell, discard to bless twice.

    Discard to explore.

    After you play this card, if the hour matches this card, recharge instead of discarding it.
- name: Blessing of Ptah
  category: boon
  type: blessing
  source: MM-6, ALCH-6, UE-6
  traits:
  - Divine
  - Ptah
  checks:
  - difficulty: '11'
    skills:
    - Divine
  powers: |-
    Discard this card to add 2 dice to any Craft check or any check that invokes the Construct or Obstacle trait.

    Discard this card to explore your location. During this exploration, add 1 die to your checks against cards that have the Construct trait and barriers.

    On your turn, if the top card of the blessings discard pile is a blessing, bury this card to encounter that card. If it matches this card, discard this card instead.
