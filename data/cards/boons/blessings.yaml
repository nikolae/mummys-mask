- name: Blessing of Wadjet
  category: boon
  type: blessing
  source: MM-B, MM-C, UE-B
  traits:
  - Divine
  - Wadjet
  checks:
  - difficulty: '7'
    skills:
    - Intelligence
    - Knowledge
  - difficulty: '5'
    skills:
    - Divine
  powers: |-
    Reveal this card to add 1d4 to your check to acquire a boon.

    Discard this card to add 2d8 to any check to acquire a boon.

    Discard this card to examine the top card of your location deck. Then you may explore your location; during this exploration, add 1 die to your checks to acquire boons.

    After you play this card, if it matches the top card of the blessings discard pile, draw a card.
