- name: Blessing of Thoth
  category: boon
  type: blessing
  source: MM-1, UM-1, UW-2
  traits:
  - Divine
  - Thoth
  - Cold
  checks:
  - difficulty: '10'
    skills:
    - Wisdom
    - Knowledge
  - difficulty: '6'
    skills:
    - Divine
  powers: |-
    On any check, discard to bless and add the Cold trait.

    On any Wisdom non-combat check or check that invokes the Cold trait, discard to bless twice.

