- name: Blessing of the Lady of Graves
  category: boon
  type: blessing
  source: MM-5, INQUIS-3, INQUIS-5, UM-5, OA1-6
  traits:
  - Divine
  - Undead
  - Pharasma
  checks:
  - difficulty: '10'
    skills:
    - Divine
  powers: "Discard this card to add 2 dice to any check that invokes the Undead trait.\n\
    \nOn any check, after the roll, bury this card to allow a character to roll her\
    \ Wisdom die and add or subtract up to that amount from her result. \n\nBury this\
    \ card to examine your location deck, then shuffle it.\n\nWhen you would bury\
    \ this card for its power, if the top card of the blessings discard pile has the\
    \ Pharasma trait, discard this card instead."
