- name: Cultist Charioteers
  category: bane
  type: villain
  source: MM-3
  subtype: barrier
  traits:
  - Cultist
  checks:
  - skills:
    - None
  powers: While displayed, when you encounter a card that has a check to acquire or
    defeat, each character rolls 1d8+1d6. Add the number of characters to the highest
    result and add 5 if the check is a combat check. This is the Cultist Charioteers'
    result. Then attempt to acquire or defeat the card. If the Cultist Charioteers'
    result exceeds the result of your highest check to acquire or defeat, put the
    card on top of a trophy stack next to this card. Otherwise, if you acquired or
    defeated the card, put it on top of a trophy stack next to your deck.
